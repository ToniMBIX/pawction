services:
  - type: web
    name: pawction-backend
    rootDir: backend
    env: php
    plan: free

    buildCommand: |
      composer install --no-dev --prefer-dist --optimize-autoloader
      php artisan route:clear
      php artisan optimize:clear

    startCommand: php artisan serve --host 0.0.0.0 --port 10000

    envVars:
      - key: APP_ENV
        value: production
      - key: APP_URL
        value: https://pawction-backend.onrender.com
      - key: FRONTEND_URL
        value: https://pawction-frontend.onrender.com
      - key: SANCTUM_STATEFUL_DOMAINS
        value: pawction-frontend.onrender.com
      - key: SESSION_DOMAIN
        value: onrender.com

      

      - key: STRIPE_SECRET
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: APP_KEY
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        value: aws-0-eu-west-1.pooler.supabase.com
      - key: DB_PORT
        value: 6543
      - key: DB_DATABASE
        value: postgres
      - key: DB_USERNAME
        value: postgres.kmidewazwlmleklpykfc
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSLMODE
        value: require

  - type: web
    name: pawction-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist

    envVars:
      - key: VITE_API_URL
        value: https://pawction-backend.onrender.com/api
      - key: VITE_STRIPE_PUBLIC
        sync: false

    routes:
      - type: rewrite
        source: /*
        destination: /index.html
